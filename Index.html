<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>العالمي للإختراق</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
padding-top:80px;
}

h1{
font-size:40px;
margin-bottom:30px;
}

#text{
white-space:pre-line;
margin-top:20px;
font-size:18px;
}

a{
display:inline-block;
margin-top:40px;
padding:12px 20px;
background:#00ff00;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:8px;
}
</style>
</head>

<body>

<h1>تم إختراق بياناتك بالكامل </h1>

<div id="text"></div>

<a href="https://www.facebook.com/horrordeath2" target="_blank">
إضغط هنا لإجراء تفاوض 
</a>

<script>
let lines = [
"Running system scan...",
"Loading data...",
"Analyzing device...",
"",
"لا تحاول إغلاق جهازك  لتجنب إنفجار الهاتف !",
"ههههههههه."
];

let i = 0;

function typeLine(){
if(i < lines.length){
document.getElementById("text").innerHTML += lines[i] + "\n";
i++;
setTimeout(typeLine, 800);
}
}

typeLine();
</script>

</body>
</html>
